name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Build vibewarz-games
        working-directory: games
        run: uv build
      - name: Build vibewarz
        working-directory: sdk-python
        run: uv build
      # `uv build` in a workspace member writes artifacts to the workspace
      # ROOT's dist/, not the member's own dist/. So both publish steps
      # run from the repo root and target one package via an explicit
      # glob. `--check-url` makes publish idempotent (skips files PyPI
      # already serves), so tagging a release that bumps only one of the
      # two packages is fine.
      - name: Publish vibewarz-games to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/ dist/vibewarz_games-*
      - name: Publish vibewarz to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/ dist/vibewarz-*
