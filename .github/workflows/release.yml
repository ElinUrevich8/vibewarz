name: release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install 3.11
      - name: Build vibewarz-games
        working-directory: games
        run: uv build
      - name: Build vibewarz
        working-directory: sdk-python
        run: uv build
      # Auth is via PyPI trusted publishing (OIDC). The job-level
      # `environment: pypi` + `permissions: id-token: write` above are
      # the GitHub side; the matching trusted-publisher entries live in
      # the PyPI project settings for both `vibewarz` and `vibewarz-games`.
      # No UV_PUBLISH_TOKEN — setting it (even to an empty secret) forces
      # uv into token-mode and breaks the OIDC handshake.
      #
      # `uv build` in a workspace member writes artifacts to the workspace
      # ROOT's dist/, not the member's own dist/. Both publish steps run
      # from the repo root and target one package via an explicit glob.
      # `--check-url` makes publish idempotent (skips files PyPI already
      # serves), so tagging a release that bumps only one of the two
      # packages is fine.
      - name: Publish vibewarz-games to PyPI
        run: uv publish --check-url https://pypi.org/simple/ dist/vibewarz_games-*
      - name: Publish vibewarz to PyPI
        run: uv publish --check-url https://pypi.org/simple/ dist/vibewarz-*
