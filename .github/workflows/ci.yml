name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync workspace
        run: uv sync --all-extras
      - name: Lint
        run: uvx ruff check .
      - name: Type check
        run: uvx mypy games/src sdk-python/src
        continue-on-error: true
      - name: Tests
        run: uv run --extra dev pytest
